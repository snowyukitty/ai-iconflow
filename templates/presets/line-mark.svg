<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Line mark technique scaffold</title>
  <desc id="desc">IconFlow's house rail demonstrates uniform line weight, a contrast halo, and one square accent on transparency.</desc>
  <!-- TECHNIQUE SCAFFOLD, not a bookmark or location glyph. Replace the rail
       with one app-specific contour; keep one weight and one semantic accent. -->
  <path d="M256 288H640V448H448V640H576V704H704V768"
        fill="none" stroke="#FFF4E8" stroke-width="160"
        stroke-linecap="square" stroke-linejoin="round"/>
  <path d="M256 288H640V448H448V640H576V704H704V768"
        fill="none" stroke="#24262E" stroke-width="88"
        stroke-linecap="square" stroke-linejoin="round"/>
  <rect x="528" y="336" width="224" height="224" rx="28"
        fill="#FFF4E8" stroke="#FF5A4F" stroke-width="72"/>
  <rect x="600" y="408" width="80" height="80" rx="8" fill="#24262E"/>
</svg>
