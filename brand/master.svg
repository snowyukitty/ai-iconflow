<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">IconFlow</title>
  <desc id="desc">A warm continuous rail moves through an offset coral proof gate and resolves into a pixel-step terminal on graphite.</desc>
  <rect id="iconflow-background" x="40" y="40" width="944" height="944" rx="212" fill="#191A20"/>
  <g id="iconflow-mark">
    <path id="iconflow-rail" d="M256 288H640V448H448V640H576V704H704V768"
          fill="none" stroke="#FFF4E8" stroke-width="128"
          stroke-linecap="square" stroke-linejoin="round"/>
    <g id="iconflow-signature">
      <rect x="512" y="320" width="256" height="256" rx="32" fill="#FF5A4F"/>
      <rect x="576" y="384" width="128" height="128" rx="12" fill="#191A20"/>
    </g>
  </g>
</svg>
